<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Producto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">MA<span>Catalog</span></div>
  <a href="index.html" class="volver">← Volver al catálogo</a>
</header>

<main class="detalle-producto" id="detalleProducto"></main>

<div class="lightbox" id="lightbox">
  <span class="cerrar-lightbox" onclick="cerrarLightbox()">&times;</span>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-fondo" onclick="cerrarLightbox()"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const numeroWhatsApp = "526621668765";

const params = new URLSearchParams(window.location.search);
const idProducto = Number(params.get("id"));
const detalle = document.getElementById("detalleProducto");

cargarDetalleProducto();

async function cargarDetalleProducto() {
  const { data: producto, error } = await supabaseClient
    .from("productos")
    .select("*")
    .eq("id", idProducto)
    .single();

  if (error || !producto) {
    detalle.innerHTML = `
      <div class="producto-no-encontrado">
        <h1>Producto no encontrado</h1>
        <p>Regresa al catálogo para ver los productos disponibles.</p>
        <a href="index.html">Volver al catálogo</a>
      </div>
    `;
    return;
  }

  const galeria = producto.imagenes && producto.imagenes.length > 0
    ? producto.imagenes
    : [producto.imagen_principal];

    const beneficios = producto.beneficios && producto.beneficios.length > 0
  ? producto.beneficios
  : ["Producto premium", "Pedido directo por WhatsApp", "Atención personalizada"];

  detalle.innerHTML = `
    <section class="producto-detalle-grid">
      <div class="producto-galeria">
        <img src="${producto.imagen_principal}"
             alt="${producto.nombre}"
             class="imagen-principal"
             onclick="abrirLightbox(this.src)">

        <div class="miniaturas">
          ${galeria.map(img => `
            <img src="${img}" onclick="cambiarImagenPrincipal('${img}')">
          `).join("")}
        </div>
      </div>

      <div class="producto-info">
        <span class="categoria-detalle">${producto.categoria || ""}</span>
        <h1>${producto.nombre}</h1>

        <div class="rating">★★★★★ <span>4.9</span></div>

        <h2>$${Number(producto.precio).toLocaleString("es-MX")}</h2>

        <p class="descripcion-detalle">
          ${producto.descripcion_larga || producto.descripcion_corta || ""}
        </p>

        <div class="beneficios">
          ${beneficios.map(b => `<p>✓ ${b}</p>`).join("")}
        </div>

        <div class="especificaciones">
          <h3>Especificaciones</h3>

          <div>
            <strong>Material:</strong>
            <span>${producto.material || "Consultar"}</span>
          </div>

          <div>
            <strong>Color:</strong>
            <span>${producto.color || "Consultar"}</span>
          </div>

          <div>
            <strong>Medidas:</strong>
            <span>${producto.medidas || "Consultar"}</span>
          </div>

          <div>
            <strong>Categoría:</strong>
            <span>${producto.categoria || "General"}</span>
          </div>
        </div>

        <div class="acciones-detalle">
          <button onclick="comprarProductoWhatsApp(${producto.id})">
            Pedir por WhatsApp
          </button>

          <button class="btn-whatsapp-detalle" onclick="comprarProductoWhatsApp(${producto.id})">
            Comprar ahora
          </button>
        </div>
      </div>
    </section>
  `;
}

function cambiarImagenPrincipal(src) {
  document.querySelector(".imagen-principal").src = src;
}

function abrirLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("activo");
  document.body.style.overflow = "hidden";
}

function cerrarLightbox() {
  document.getElementById("lightbox").classList.remove("activo");
  document.body.style.overflow = "auto";
}

async function comprarProductoWhatsApp(id) {
  const { data: producto } = await supabaseClient
    .from("productos")
    .select("*")
    .eq("id", id)
    .single();

  const mensaje = `Hola, quiero información de este producto:%0A%0AProducto: ${producto.nombre}%0APrecio: $${Number(producto.precio).toLocaleString("es-MX")}%0ACategoría: ${producto.categoria || "General"}%0A%0AQuedo pendiente.`;

  const url = `https://wa.me/${numeroWhatsApp}?text=${mensaje}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
